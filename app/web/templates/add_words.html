{% extends "base.html" %}
{% block content %}
<section class="card">
    <h1>Добавить слова</h1>
    <p class="hint">Формат: <code>слово - перевод, перевод, перевод</code></p>
    {% if error %}<p class="error preserve-lines">{{ error }}</p>{% endif %}
    {% if ok %}<p class="ok preserve-lines">{{ ok }}</p>{% endif %}
    <form class="stack" action="/words/add" method="post">
        <textarea class="input textarea" name="raw_words" rows="10" placeholder="안녕 - привет, здравствуй" required></textarea>
        <button class="btn btn-primary" type="submit">Сохранить</button>
    </form>
</section>
{% endblock %}
